name: Build TeleTool APT package

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    tags:
      - "v*"
    paths-ignore:
      - "apt-repo/**"
      - "apt-repo-dev/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out TeleTool
        uses: actions/checkout@v4

      - name: Install ARM64 build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            apt-utils \
            binutils \
            build-essential \
            cargo \
            curl \
            dpkg-dev \
            file \
            gstreamer1.0-tools \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            pkg-config \
            rustc \
            xz-utils

      - name: Build the ARM64 GStreamer NDI plugin
        run: scripts/build_gst_ndi_plugin.sh dist/libgstndi.so

      - name: Validate Tvheadend access schema
        run: python3 scripts/check_tvheadend_access_schema.py

      - name: Validate package Web updater
        run: python3 scripts/check_package_updater.py

      - name: Build the Debian package
        env:
          TELETOOL_GST_NDI_PLUGIN: ${{ github.workspace }}/dist/libgstndi.so
        run: scripts/build_deb.sh dist

      - name: Import the APT repository signing key
        id: signing
        env:
          TELETOOL_APT_GPG_PRIVATE_KEY: ${{ secrets.TELETOOL_APT_GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$TELETOOL_APT_GPG_PRIVATE_KEY" ]; then
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s' "$TELETOOL_APT_GPG_PRIVATE_KEY" | gpg --batch --import
          fingerprint="$(gpg --batch --with-colons --list-secret-keys | awk -F: '$1 == "fpr" {print $10; exit}')"
          test -n "$fingerprint"
          echo "TELETOOL_GPG_KEY=$fingerprint" >> "$GITHUB_ENV"
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Build the APT repository
        run: scripts/build_apt_repo.sh dist build/apt-repo

      - name: Resolve the Dev package version
        if: github.ref == 'refs/heads/dev'
        id: dev_version
        run: |
          base="$(tr -d '\r\n' < VERSION)"
          base="${base#V}"
          base="${base#v}"
          echo "version=${base}+dev.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build the Dev Debian package
        if: github.ref == 'refs/heads/dev'
        env:
          TELETOOL_GST_NDI_PLUGIN: ${{ github.workspace }}/dist/libgstndi.so
          TELETOOL_PACKAGE_VERSION: ${{ steps.dev_version.outputs.version }}
          TELETOOL_RELEASE_BRANCH: dev
        run: scripts/build_deb.sh dist-dev

      - name: Build the Dev APT repository
        if: github.ref == 'refs/heads/dev'
        env:
          TELETOOL_APT_SUITE: dev
        run: scripts/build_apt_repo.sh dist-dev build/apt-repo-dev

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: teletool-arm64-package
          path: |
            dist/*.deb
            build/apt-repo/
          if-no-files-found: error

      - name: Upload Dev build artifacts
        if: github.ref == 'refs/heads/dev'
        uses: actions/upload-artifact@v4
        with:
          name: teletool-arm64-dev-package
          path: |
            dist-dev/*.deb
            build/apt-repo-dev/
          if-no-files-found: error

      - name: Publish tagged Debian package to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          release_args=()
          case "$tag" in
            *-rc*|*-test*) release_args+=(--prerelease) ;;
          esac
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --title "TeleTool $tag" --generate-notes "${release_args[@]}"
          gh release upload "$tag" dist/teletool_*_arm64.deb --clobber
