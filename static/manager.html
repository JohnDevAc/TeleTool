<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TeleTool</title>
  <link rel="stylesheet" href="/static/common.css">
</head>

<body>
<div class="wrap managerWrap">
  <header>
    <div class="title">
      <h1>TeleTool Fleet Manager</h1>
    </div>
    <div class="rightTop">
      <a class="miniBtn" href="/">NDI®</a>
      <a class="miniBtn" href="/audio">Audio</a>
      <a class="miniBtn" href="/system">System</a>
      <div class="pill" title="Fleet Manager polling state">
        <span id="managerDot" class="dot"></span>
        <span id="managerStatusText">CONNECTING</span>
      </div>
      <a class="brandLogoLink" data-tvh-link href="#">
        <img class="brandLogo" src="/static/TeleTwat_V1_0_all_black_transparent.png" alt="TeleTwat logo" />
      </a>
    </div>
  </header>

  <div class="grid managerGrid">
    <div class="card managerControls">
      <div class="managerPanelHead">
        <h2>Units</h2>
      </div>
      <form id="addUnitForm" class="row">
        <div class="field">
          <label for="unitHost">IP addresses or hostnames</label>
          <input id="unitHost" placeholder="192.168.1.50, teletool-2.local" autocomplete="off" spellcheck="false" required />
        </div>
        <div class="actions managerControlActions">
          <button id="addUnit" class="primary" type="submit">Add Unit</button>
          <button id="refreshUnits" class="miniBtn" type="button">Refresh</button>
          <span id="toast" class="toast"></span>
        </div>
      </form>
    </div>

    <div id="adoptedNotice" class="card managerAdopted hidden">
      <h2>Managed remotely</h2>
      <div class="small">
        This TeleTool is adopted by <a id="adoptedManagerLink" class="inlineLink" href="#" target="_blank" rel="noopener">another Fleet Manager</a>.
      </div>
      <div id="adoptedExpiry" class="small mono"></div>
    </div>

    <div id="fleetPillStrip" class="fleetPillStrip hidden" aria-live="polite"></div>

    <div id="managerEmpty" class="card managerEmpty hidden">
      <h2>No units</h2>
    </div>

    <div id="unitsGrid" class="unitGrid" aria-live="polite"></div>
  </div>
</div>

<script src="/static/common.js"></script>
<script>
let pollTimer = null;
let refreshBusy = false;
let managerAdopted = false;
let latestUnits = [];
const MANAGER_POLL_MS = 1000;

function escapeHtml(value){
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;"
  }[ch]));
}

function textOrDash(value){
  const text = String(value ?? "").trim();
  return text || "-";
}

function badgeClass(kind){
  return kind ? "badge " + kind : "badge";
}

function setManagerHealth(ok){
  if (managerAdopted) return;
  const dot = document.getElementById("managerDot");
  const text = document.getElementById("managerStatusText");
  dot.classList.toggle("ok", !!ok);
  dot.classList.toggle("bad", ok === false);
  text.textContent = ok ? "ONLINE" : "OFFLINE";
}

function unitTitle(unit){
  return unit.hostname || unit.host || unit.address || "TeleTool";
}

function statusLine(unit){
  if (!unit.online) return unit.error || "Unit is unreachable";
  if (unit.adoption_error) return unit.adoption_error;
  return unit.last_error || unit.last_warning || "";
}

function unitPillStatus(unit){
  if (!unit || !unit.online) {
    return { kind:"bad", text:"Offline", title:statusLine(unit || {}) || "Unit is unreachable" };
  }
  const rfKind = rfSignalKind(unit.rf);
  const rfLabel = rfSignalLabel(unit.rf);
  const running = !!unit.stream_running;
  if (running && rfKind === "bad") {
    return { kind:"bad", text:`Running | RF ${rfLabel}`, title:rfSignalTitle(unit.rf) };
  }
  if (running && rfKind === "warn") {
    return { kind:"warn", text:`Running | RF ${rfLabel}`, title:rfSignalTitle(unit.rf) };
  }
  if (!running) {
    return { kind:"warn", text:`Stopped | RF ${rfLabel}`, title:statusLine(unit) || rfSignalTitle(unit.rf) };
  }
  return { kind:"good", text:`Running | RF ${rfLabel}`, title:rfSignalTitle(unit.rf) };
}

function renderFleetPills(units){
  const strip = document.getElementById("fleetPillStrip");
  if (!strip) return;
  const list = Array.isArray(units) ? units : [];
  strip.classList.toggle("hidden", managerAdopted || list.length === 0);
  if (managerAdopted || !list.length){
    strip.innerHTML = "";
    return;
  }
  strip.innerHTML = list.map(unit => {
    const status = unitPillStatus(unit);
    const host = unitTitle(unit);
    const address = unit.address || unit.host || "";
    const title = [host, address, status.title].filter(Boolean).join(" | ");
    return `
      <button class="fleetUnitPill ${escapeHtml(status.kind)}" type="button" title="${escapeHtml(title)}" data-focus-unit="${escapeHtml(unit.id || "")}">
        <span class="rfDot ${escapeHtml(status.kind)}" aria-hidden="true"></span>
        <span class="fleetUnitName">${escapeHtml(host)}</span>
        <span class="fleetUnitStatus">${escapeHtml(status.text)}</span>
      </button>
    `;
  }).join("");
}

function renderUnit(unit){
  const isSelf = !!unit.is_self;
  const systemKind = unit.online ? "good" : "bad";
  const systemText = unit.online ? "Online" : "Offline";
  const streamKind = !unit.online ? "bad" : (unit.stream_running ? "good" : "warn");
  const streamText = !unit.online ? "Unavailable" : (unit.stream_running ? "Running" : "Stopped");
  const channel = unit.stream_running ? textOrDash(unit.channel_label) : "-";
  const ndiName = textOrDash(unit.ndi_name || unit.default_ndi_name);
  const issue = statusLine(unit);
  const uptime = unit.stream_running ? fmtUptime(unit.started_at) : "-";
  const latency = Number.isFinite(Number(unit.latency_ms)) ? `${unit.latency_ms} ms` : "-";
  const rfKind = unit.online ? rfSignalKind(unit.rf) : "bad";
  const rfLabel = unit.online ? rfSignalLabel(unit.rf) : "N/A";
  const rfTitle = unit.online ? rfSignalTitle(unit.rf) : "RF signal unavailable";
  const versionText = unit.version ? `${unit.version}${unit.development_release ? " Dev" : ""}` : "-";
  const versionTitle = unit.release_label ? `${unit.release_label}${unit.release_branch ? " branch" : ""}` : "Software version";
  const canStart = !!(unit.online && !unit.stream_running && unit.control_ready);
  const canStop = !!(unit.online && unit.stream_running);
  const startTitle = !unit.online
    ? "Unit is offline"
    : unit.stream_running
      ? "NDI is already running"
      : unit.control_ready
        ? "Start the last selected NDI stream"
        : (unit.control_error || "Open UI and choose a channel first");
  const stopTitle = unit.online ? "Stop NDI stream" : "Unit is offline";
  const controlId = escapeHtml(unit.id || "");
  const startDisabled = canStart ? "" : " disabled";
  const stopDisabled = canStop ? "" : " disabled";
  const removeButton = unit.removable === false ? "" : `<button class="miniBtn" type="button" data-remove-unit="${escapeHtml(unit.id)}">Remove</button>`;

  return `
    <article class="card unitCard ${unit.online ? "" : "isOffline"} ${isSelf ? "isPrimary" : ""}" data-unit-id="${controlId}">
      <div class="unitTop">
        <div class="unitIdentity">
          <span class="dot ${unit.online ? "ok" : "bad"}" aria-hidden="true"></span>
          <div>
            <h2>${escapeHtml(unitTitle(unit))}</h2>
            <div class="small mono">${escapeHtml(unit.address || unit.host || "-")}</div>
          </div>
        </div>
        <div class="unitActions">
          <a class="miniBtn" href="${escapeHtml(unit.main_url || unit.base_url || "#")}" target="_blank" rel="noopener">Open UI</a>
          <button class="miniBtn primary" type="button" data-start-unit="${controlId}" title="${escapeHtml(startTitle)}"${startDisabled}>Start</button>
          <button class="miniBtn danger" type="button" data-stop-unit="${controlId}" title="${escapeHtml(stopTitle)}"${stopDisabled}>Stop</button>
          ${removeButton}
        </div>
      </div>

      <div class="unitBadges">
        ${isSelf ? `<span class="badge">Primary</span>` : ""}
        <span class="${badgeClass(systemKind)}">${escapeHtml(systemText)}</span>
        <span class="${badgeClass(streamKind)}">${escapeHtml(streamText)}</span>
        <span class="badge rfValue" title="${escapeHtml(rfTitle)}"><span class="rfDot ${escapeHtml(rfKind)}" aria-hidden="true"></span><span>RF ${escapeHtml(rfLabel)}</span></span>
      </div>

      <div class="unitStats">
        <div class="stat">
          <div class="k">Software</div>
          <div class="v mono" title="${escapeHtml(versionTitle)}">${escapeHtml(versionText)}</div>
        </div>
        <div class="stat">
          <div class="k">NDI stream name</div>
          <div class="v mono">${escapeHtml(ndiName)}</div>
        </div>
        <div class="stat">
          <div class="k">Channel</div>
          <div class="v">${escapeHtml(channel)}</div>
        </div>
        <div class="stat">
          <div class="k">Uptime</div>
          <div class="v mono">${escapeHtml(uptime)}</div>
        </div>
      </div>

      <div class="unitFoot">
        <span class="small">${escapeHtml(issue)}</span>
        <span class="small mono">${escapeHtml(latency)}</span>
      </div>
    </article>
  `;
}

function renderUnits(units){
  const grid = document.getElementById("unitsGrid");
  const empty = document.getElementById("managerEmpty");
  const list = Array.isArray(units) ? units : [];
  grid.classList.toggle("hidden", managerAdopted);
  empty.classList.toggle("hidden", managerAdopted || list.length > 0);
  if (managerAdopted){
    grid.innerHTML = "";
    renderFleetPills(list);
    return;
  }
  grid.innerHTML = list.map(renderUnit).join("");
  renderFleetPills(list);
}

function setManagerAdoption(adoption){
  managerAdopted = !!(adoption && adoption.adopted);
  const notice = document.getElementById("adoptedNotice");
  const link = document.getElementById("adoptedManagerLink");
  const expiry = document.getElementById("adoptedExpiry");
  const addBtn = document.getElementById("addUnit");
  const refreshBtn = document.getElementById("refreshUnits");
  const hostInput = document.getElementById("unitHost");

  if (addBtn) addBtn.disabled = managerAdopted;
  if (refreshBtn) refreshBtn.disabled = managerAdopted;
  if (hostInput) hostInput.disabled = managerAdopted;

  notice.classList.toggle("hidden", !managerAdopted);
  if (managerAdopted){
    const managerUrl = String(adoption.manager_url || "").trim();
    const managerName = String(adoption.manager_name || managerUrl || "another Fleet Manager").trim();
    link.textContent = managerName;
    if (managerUrl){
      link.href = managerUrl;
      link.classList.remove("disabledLink");
    } else {
      link.href = "#";
      link.classList.add("disabledLink");
    }
    const expiresAt = Number(adoption.expires_at || 0);
    expiry.textContent = expiresAt ? "Lease expires " + new Date(expiresAt * 1000).toLocaleTimeString() : "";
    const dot = document.getElementById("managerDot");
    const text = document.getElementById("managerStatusText");
    dot.classList.remove("ok", "bad");
    text.textContent = "ADOPTED";
  }
  renderUnits(latestUnits);
}

async function refreshAdoption(){
  try{
    const adoption = await jget("/api/manager/adoption");
    setManagerAdoption(adoption);
    return adoption;
  }catch(e){
    console.warn("Adoption status failed", e);
    return null;
  }
}

function schedulePoll(delayMs=MANAGER_POLL_MS){
  if (pollTimer) clearTimeout(pollTimer);
  pollTimer = setTimeout(refreshUnits, delayMs);
}

async function refreshUnits(){
  if (document.visibilityState === "hidden") return;
  if (refreshBusy) return;
  refreshBusy = true;
  try{
    const adoption = await refreshAdoption();
    if (adoption && adoption.adopted){
      latestUnits = [];
      renderUnits(latestUnits);
      return;
    }
    const data = await jget("/api/manager/status");
    latestUnits = data.units || [];
    renderUnits(latestUnits);
    setManagerHealth(true);
  }catch(e){
    setManagerHealth(false);
    renderFleetPills(latestUnits);
    toast("Fleet Manager refresh failed: " + String(e.message || e), "bad", 3500);
  }finally{
    refreshBusy = false;
    schedulePoll(MANAGER_POLL_MS);
  }
}

document.getElementById("addUnitForm").addEventListener("submit", async (event) => {
  event.preventDefault();
  await refreshAdoption();
  if (managerAdopted){
    toast("Management is disabled while this TeleTool is adopted.", "warn", 3500);
    return;
  }
  const input = document.getElementById("unitHost");
  const host = input.value.trim();
  if (!host){
    toast("Enter an IP address or hostname.", "warn");
    return;
  }
  const hostCount = host.split(",").map(item => item.trim()).filter(Boolean).length || 1;
  document.getElementById("addUnit").disabled = true;
  toast(hostCount > 1 ? `Validating ${hostCount} units...` : "Validating unit...");
  try{
    const data = await jpost("/api/manager/units", { host });
    const results = Array.isArray(data.results) ? data.results : [];
    const added = Number(data.added_count ?? (data.unit ? 1 : 0));
    const failed = Number(data.failed_count ?? results.filter(item => !item.ok).length);
    const failures = results.filter(item => !item.ok);
    const firstFailure = failures.length ? `${failures[0].input || "Unit"}: ${failures[0].error || "could not be added"}` : "";
    if (added > 0) input.value = "";
    if (added > 0 && failed > 0) {
      toast(`${added} added, ${failed} failed.${firstFailure ? " " + firstFailure : ""}`, "warn", 6500);
    } else if (added > 0) {
      toast(added === 1 ? "Unit added." : `${added} units added.`, "good");
    } else {
      toast(firstFailure ? `No units added. ${firstFailure}` : "No units added.", "bad", 5500);
    }
    await refreshUnits();
  }catch(e){
    toast("Add failed: " + String(e.message || e), "bad", 4500);
  }finally{
    document.getElementById("addUnit").disabled = false;
  }
});

document.getElementById("refreshUnits").addEventListener("click", async () => {
  await refreshAdoption();
  if (!managerAdopted) await refreshUnits();
});

document.getElementById("fleetPillStrip").addEventListener("click", (event) => {
  const pill = event.target.closest("[data-focus-unit]");
  if (!pill) return;
  const unitId = pill.getAttribute("data-focus-unit");
  const card = unitId ? Array.from(document.querySelectorAll("[data-unit-id]")).find(item => item.getAttribute("data-unit-id") === unitId) : null;
  if (card) card.scrollIntoView({ behavior:"smooth", block:"center" });
});

document.getElementById("unitsGrid").addEventListener("click", async (event) => {
  if (managerAdopted) return;
  const controlButton = event.target.closest("[data-start-unit], [data-stop-unit]");
  if (controlButton){
    const action = controlButton.hasAttribute("data-start-unit") ? "start" : "stop";
    const unitId = controlButton.getAttribute(action === "start" ? "data-start-unit" : "data-stop-unit");
    if (!unitId) return;
    await refreshAdoption();
    if (managerAdopted){
      toast("Management is disabled while this TeleTool is adopted.", "warn", 3500);
      return;
    }
    controlButton.disabled = true;
    toast(action === "start" ? "Starting NDI..." : "Stopping NDI...");
    try{
      await jpost("/api/manager/units/" + encodeURIComponent(unitId) + "/" + action, {});
      toast(action === "start" ? "NDI started." : "NDI stopped.", "good");
      await refreshUnits();
    }catch(e){
      toast((action === "start" ? "Start" : "Stop") + " failed: " + String(e.message || e), "bad", 4500);
      controlButton.disabled = false;
    }
    return;
  }

  const button = event.target.closest("[data-remove-unit]");
  if (!button) return;
  const unitId = button.getAttribute("data-remove-unit");
  if (!unitId) return;
  if (!window.confirm("Remove this TeleTool unit?")) return;
  button.disabled = true;
  try{
    await jdelete("/api/manager/units/" + encodeURIComponent(unitId));
    toast("Unit removed.", "good");
    await refreshUnits();
  }catch(e){
    toast("Remove failed: " + String(e.message || e), "bad", 4500);
    button.disabled = false;
  }
});

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") refreshUnits();
  else if (pollTimer) {
    clearTimeout(pollTimer);
    pollTimer = null;
  }
});

refreshUnits();
</script>
</body>
</html>
