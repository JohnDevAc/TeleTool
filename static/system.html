<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TeleTool</title>
  <link rel="stylesheet" href="/static/common.css">
  
</head>

<body>
<div class="wrap">
  <header>
    <div class="title">
      <h1>System</h1>
    </div>

    <div class="rightTop">
      <a class="miniBtn" href="/manager">Fleet Manager</a>
      <a class="miniBtn" href="/">NDI</a>
      <a class="miniBtn" href="/audio">Audio</a>
      <div class="pill" title="Backend/API health">
        <span id="dot" class="dot"></span>
        <span id="statusText">CONNECTING</span>
      </div>
      <a class="brandLogoLink" data-tvh-link href="#">
        <img class="brandLogo" src="/static/TeleTwat_V1_0_all_black_transparent.png" alt="TeleTwat logo" />
      </a>
    </div>
  </header>

  <div class="grid">

    <div class="card">
      <h2>Power</h2>
      <div class="row">
        <button id="restartProgram" class="primary">Restart program</button>
        <button id="rebootPi" class="danger">Reboot Pi</button>
        <span id="appVersionBadge" class="badge">Version -</span>
        <span id="toastPower" class="toast"></span>
        <select id="updateBranch" class="updateBranchSelect pushRight" aria-label="Update branch">
          <option value="main">Main</option>
          <option value="dev">Dev</option>
        </select>
        <button id="updateFromServer" class="danger">Update from Server</button>
      </div>
      <div id="updateProgressWrap" class="hidden updateProgress">
        <div class="small" id="updateProgressStep">Idle</div>
        <div class="progressTrack" aria-hidden="true">
          <div id="updateProgressBar" class="progressBar"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <h2 style="margin:0;">Network</h2>
        <span id="netBadge" class="badge" style="display:none;"></span>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="k">Mode</div>
          <div id="st_mode" class="v">—</div>
        </div>
        <div class="stat">
          <div class="k">IPv4</div>
          <div id="st_ip" class="v mono">—</div>
        </div>
        <div class="stat">
          <div class="k">Gateway</div>
          <div id="st_gw" class="v mono">—</div>
        </div>
        <div class="stat" style="grid-column:1 / -1;">
          <div class="k">DNS</div>
          <div id="st_dns" class="v mono" style="word-break:break-all;">—</div>
        </div>
      </div>

      <div class="row" style="margin-top:12px;">
        <div class="field">
          <label for="mode">Addressing</label>
          <select id="mode">
            <option value="dhcp">DHCP (automatic)</option>
            <option value="manual">Manual (static)</option>
          </select>
        </div>
      </div>

      <div id="manualFields" class="row hidden" style="margin-top:4px;">
        <div class="field">
          <label for="ip">IP address</label>
          <input id="ip" placeholder="e.g. 192.168.1.50" inputmode="decimal" />
        </div>
        <div class="field">
          <label for="subnet">Subnet mask</label>
          <input id="subnet" placeholder="e.g. 255.255.255.0" inputmode="decimal" />
        </div>
        <div class="field">
          <label for="gw">Gateway</label>
          <input id="gw" placeholder="e.g. 192.168.1.1" inputmode="decimal" />
        </div>
        <div class="field">
          <label for="dns">DNS (space-separated)</label>
          <input id="dns" placeholder="e.g. 1.1.1.1 8.8.8.8" />
        </div>
      </div>

      <div class="actions">
        <button id="applyNetwork" class="primary">Apply network settings</button>
        <button id="refreshNet" class="miniBtn" type="button">Refresh</button>
        <span id="toastNet" class="toast"></span>
      </div>
    </div>

    <div class="card">
      <h2>Hostname</h2>

      <div class="row">
        <div class="field">
          <label>Current hostname</label>
          <div id="currentHostnameText" class="mono" style="padding:10px 12px; border:1px solid #2a2a2a; border-radius:12px; background:#141414;">—</div>
        </div>
        <div class="field">
          <label for="newHostname">New hostname</label>
          <input id="newHostname" placeholder="e.g. broadcastpi-1" />
        </div>
      </div>

      <div class="actions">
        <button id="applyHostname" class="primary">Change hostname</button>
        <span id="toastHost" class="toast"></span>
      </div>
    </div>


    <div class="card">
      <h2>App config</h2>

      <div class="row">
        <div class="field">
          <label for="cfg_ndi_delay_ms">NDI delay (ms)</label>
          <input id="cfg_ndi_delay_ms" inputmode="numeric" placeholder="500" />
        </div>
        <div class="field">
          <label for="cfg_ndi_buffer_extra_ms">NDI jitter buffer extra (ms)</label>
          <input id="cfg_ndi_buffer_extra_ms" inputmode="numeric" placeholder="0" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="cfg_ndi_auto_reconnect_enabled">Auto reconnect</label>
          <select id="cfg_ndi_auto_reconnect_enabled">
            <option value="true">Enabled</option>
            <option value="false">Disabled</option>
          </select>
        </div>
        <div class="field">
          <label for="cfg_ndi_startup_grace_s">Startup grace (s)</label>
          <input id="cfg_ndi_startup_grace_s" inputmode="decimal" placeholder="10" />
        </div>
        <div class="field">
          <label for="cfg_ndi_stall_timeout_s">Stall timeout (s)</label>
          <input id="cfg_ndi_stall_timeout_s" inputmode="decimal" placeholder="5" />
        </div>
      </div>

      <div class="actions">
        <button id="saveAppConfig" class="primary">Save app config</button>
        <span id="toastConfig" class="toast"></span>
      </div>
    </div>

  </div>
</div>

<script src="/static/common.js"></script>
<script>
let updatePollTimer = null;
let updateReturnTimer = null;
let updateReturnStarted = false;

function netFieldFocused(){
  const a = document.activeElement;
  if (!a) return false;
  return ["mode","ip","subnet","gw","dns"].includes(a.id);
}



function setHealth(ok){
  const dot = document.getElementById("dot");
  const t = document.getElementById("statusText");
  dot.classList.toggle("ok", !!ok);
  dot.classList.toggle("bad", ok === false);
  t.textContent = ok ? "ONLINE" : "OFFLINE";
}

function setBadgeId(id, kind, text){
  const b = document.getElementById(id);
  if (!b) return;
  if (!text){
    b.style.display = "none";
    b.textContent = "";
    b.className = "badge";
    return;
  }
  b.style.display = "inline-flex";
  b.textContent = text;
  b.className = "badge " + (kind || "");
}

function toastId(id, msg, isBad=false, ms=2600){
  const el = document.getElementById(id);
  if (!el) { console.log("[toast]", msg); return; }
  el.textContent = msg;
  el.classList.remove("good","bad","warn");
  el.classList.add(isBad ? "bad" : "good");
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), ms);
}

function renderUpdateStatus(st){
  const wrap = document.getElementById("updateProgressWrap");
  const step = document.getElementById("updateProgressStep");
  const bar = document.getElementById("updateProgressBar");
  const btn = document.getElementById("updateFromServer");
  const branchSelect = document.getElementById("updateBranch");
  const running = !!(st && st.running);
  const done = !!(st && st.done);
  const error = st && st.error ? String(st.error) : "";
  const show = running || done || error;

  wrap.classList.toggle("hidden", !show);
  const percent = Math.max(0, Math.min(100, Number((st && st.percent) || 0)));
  bar.style.width = `${percent}%`;
  step.textContent = error ? ("Update failed: " + error) : ((st && st.step) || "Idle");
  if (btn) btn.disabled = running || (done && !error);
  if (branchSelect) branchSelect.disabled = running || (done && !error);

  if (error) toastId("toastPower", "Update failed: " + error, true, 7000);
  else if (running) toastId("toastPower", "Updating from " + updateBranchLabel(st && st.branch) + " branch...");
  else if (done){
    toastId("toastPower", "Update complete. Restarting program.", false, 5000);
    scheduleReturnToMainUi();
  }
}

function updateBranchLabel(branch){
  return String(branch || "main").toLowerCase() === "dev" ? "Dev" : "Main";
}

async function returnToMainUiWhenReady(){
  try{
    const r = await fetch("/", { cache: "no-store" });
    if (r.ok){
      window.location.replace("/");
      return;
    }
  }catch(e){
    // Service may still be restarting; try again shortly.
  }
  updateReturnTimer = setTimeout(returnToMainUiWhenReady, 1500);
}

function scheduleReturnToMainUi(){
  if (updateReturnStarted) return;
  updateReturnStarted = true;
  if (updateReturnTimer) clearTimeout(updateReturnTimer);
  updateReturnTimer = setTimeout(returnToMainUiWhenReady, 4500);
}

function scheduleUpdatePoll(delayMs=1000){
  if (updatePollTimer) clearTimeout(updatePollTimer);
  updatePollTimer = setTimeout(refreshUpdateStatus, delayMs);
}

async function refreshUpdateStatus(){
  try{
    const st = await jget("/api/system/update_status");
    renderUpdateStatus(st);
    if (st && st.running) scheduleUpdatePoll(1000);
  }catch(e){
    // During the final restart window this request may fail briefly; the service
    // manager should bring the program back.
    scheduleUpdatePoll(2500);
  }
}

function prefixToSubnetMask(prefix){
  const p = Number(prefix);
  if (!Number.isInteger(p) || p < 0 || p > 32) return "";
  const mask = p === 0 ? 0 : (0xffffffff << (32 - p)) >>> 0;
  return [24,16,8,0].map(shift => (mask >>> shift) & 255).join(".");
}

function splitIpv4Cidr(cidr){
  const v = String(cidr || "").trim();
  if (!v) return { ip: "", subnetMask: "" };
  const parts = v.split("/");
  return { ip: parts[0] || "", subnetMask: parts.length > 1 ? prefixToSubnetMask(parts[1]) : "" };
}

function setManualVisible(){
  const mode = document.getElementById("mode").value;
  document.getElementById("manualFields").classList.toggle("hidden", mode !== "manual");
}

["mode","ip","subnet","gw","dns"].forEach(id => {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener("change", () => {
    lockNetworkFormFor(20000);
    if (id === "mode") setManualVisible();
  });
  el.addEventListener("input", () => lockNetworkFormFor(20000));
});

async function refreshHostname(){
  try{
    const info = await jget("/api/system/hostname");
    const hn = (typeof info.hostname === "string") ? info.hostname : "";
    const ch = document.getElementById("currentHostnameText");
    if (ch) ch.textContent = hn || "—";
    if (!document.activeElement || document.activeElement.id !== "newHostname"){
      document.getElementById("newHostname").placeholder = hn || "e.g. broadcastpi-1";
    }
  } catch(e){
    // Hostname read is non-critical; keep UI responsive.
  }
}

async function refreshNetwork(){
  try{
    const info = await jget("/api/system/network_info");
    setHealth(true);

    const n = (info && info.network) ? info.network : {};
    document.getElementById("st_mode").textContent = (n.mode || "—").toUpperCase();
    document.getElementById("st_ip").textContent = n.ipv4 || "—";
    document.getElementById("st_gw").textContent = n.gateway || "—";
    document.getElementById("st_dns").textContent = (n.dns && n.dns.length) ? n.dns.join(" ") : "—";

    if (!isNetworkFormLocked() && !netFieldFocused()){
      const ipParts = splitIpv4Cidr(n.ipv4 || "");
      document.getElementById("mode").value = n.mode || "dhcp";
      document.getElementById("ip").value = ipParts.ip;
      document.getElementById("subnet").value = ipParts.subnetMask;
      document.getElementById("gw").value = n.gateway || "";
      document.getElementById("dns").value = (n.dns && n.dns.length) ? n.dns.join(" ") : "";
      setManualVisible();
    }

    if (info.warnings && info.warnings.length){
      setBadgeId("netBadge", "warn", info.warnings[0]);
    } else {
      setBadgeId("netBadge", "", "");
    }
  } catch(e){
    // Don't spam toast for network discovery failures; just show badge and keep UI
    setBadgeId("netBadge", "warn", "Network refresh failed");
  }
}

async function refreshConfig(){
  try{
    const cfg = await jget("/api/config/ui");
    document.getElementById("cfg_ndi_delay_ms").value = String(cfg.ndi_delay_ms ?? 500);
    document.getElementById("cfg_ndi_buffer_extra_ms").value = String(cfg.ndi_buffer_extra_ms ?? 0);
    document.getElementById("cfg_ndi_auto_reconnect_enabled").value = String(cfg.ndi_auto_reconnect_enabled !== false);
    document.getElementById("cfg_ndi_startup_grace_s").value = String(cfg.ndi_startup_grace_s ?? 10);
    document.getElementById("cfg_ndi_stall_timeout_s").value = String(cfg.ndi_stall_timeout_s ?? 5);
  } catch(e){
    toastId("toastConfig", "Config refresh failed", true);
  }
}

async function refreshReleaseInfo(){
  try{
    const info = await jget("/api/release");
    const badge = document.getElementById("appVersionBadge");
    if (!badge) return;
    const version = info && info.version ? String(info.version) : "-";
    badge.textContent = `Version ${version}`;
    if (info && info.label) badge.title = `${info.label} branch`;
  } catch(e){
    const badge = document.getElementById("appVersionBadge");
    if (badge) badge.textContent = "Version -";
  }
}

async function refreshAll(){
  await Promise.all([refreshHostname(), refreshNetwork(), refreshConfig(), refreshReleaseInfo()]);
}

document.getElementById("mode").addEventListener("change", () => {
  lockNetworkFormFor(20000);
  setManualVisible();
});

["ip","subnet","gw","dns"].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener("input", () => lockNetworkFormFor(20000));
  el.addEventListener("focus", () => lockNetworkFormFor(20000));
});

document.getElementById("refreshNet").addEventListener("click", refreshAll);

document.getElementById("applyNetwork").addEventListener("click", async () => {
  toastId("toastNet", "Applying…");
  const mode = document.getElementById("mode").value;
  const payload = { mode };

  if (mode === "manual"){
    payload.ip_address = document.getElementById("ip").value.trim();
    payload.subnet_mask = document.getElementById("subnet").value.trim();
    payload.gateway = document.getElementById("gw").value.trim();
    payload.dns = document.getElementById("dns").value.trim();

    if (!payload.ip_address || !payload.subnet_mask){
      toastId("toastNet", "Manual mode needs an IP address and subnet mask, e.g. 192.168.1.50 and 255.255.255.0", true);
      return;
    }
  }

  try{
    const r = await jpost("/api/system/network", payload);
    toastId("toastNet", r.message || "Network updated.");
    if (r.warning) setBadgeId("netBadge", "warn", r.warning);
  } catch(e){
    toastId("toastNet", "Network update failed: " + e, true);
  }
  // may drop connection if IP changed; this refresh is best-effort
  setTimeout(refreshAll, 1200);
});

document.getElementById("applyHostname").addEventListener("click", async () => {
  const hn = document.getElementById("newHostname").value.trim();
  if (!hn){
    toastId("toastHost", "Please enter a hostname.", true);
    return;
  }
  toastId("toastHost", "Applying…");
  try{
    const r = await jpost("/api/system/hostname", { hostname: hn });
    toastId("toastHost", r.message || "Hostname updated.");
    document.getElementById("newHostname").value = "";
  } catch(e){
    toastId("toastHost", "Hostname update failed: " + e, true);
  }
  setTimeout(refreshHostname, 800);
});

document.getElementById("restartProgram").addEventListener("click", async () => {
  const btn = document.getElementById("restartProgram");
  btn.disabled = true;
  toastId("toastPower", "Restarting program…");
  try{
    const r = await jpost("/api/system/restart_program", {});
    toastId("toastPower", r.message || "Restart requested.");
  } catch(e){
    toastId("toastPower", "Restart requested. Waiting for service to return.", false, 5000);
  }
  setTimeout(async () => {
    btn.disabled = false;
    await refreshAll();
  }, 8000);
});

document.getElementById("updateFromServer").addEventListener("click", async () => {
  const branch = document.getElementById("updateBranch").value || "main";
  const branchLabel = updateBranchLabel(branch);
  const ok = window.confirm(`Update from the ${branchLabel} branch now? Do not do this while TeleTool is in production. The service will restart after the update.`);
  if (!ok) return;
  const btn = document.getElementById("updateFromServer");
  btn.disabled = true;
  renderUpdateStatus({ running: true, done: false, percent: 1, step: "Starting update", branch });
  try{
    await jpost("/api/system/update_from_server", { confirm: true, branch });
    await refreshUpdateStatus();
    scheduleUpdatePoll(1000);
  } catch(e){
    toastId("toastPower", "Update failed: " + e, true, 7000);
    renderUpdateStatus({ running: false, done: true, percent: 100, step: "Update failed", error: String(e) });
    btn.disabled = false;
  }
});

document.getElementById("saveAppConfig").addEventListener("click", async () => {
  toastId("toastConfig", "Saving…");
  try{
    const payload = {
      ndi_delay_ms: Number(document.getElementById("cfg_ndi_delay_ms").value || 500),
      ndi_buffer_extra_ms: Number(document.getElementById("cfg_ndi_buffer_extra_ms").value || 0),
      ndi_auto_reconnect_enabled: document.getElementById("cfg_ndi_auto_reconnect_enabled").value === "true",
      ndi_startup_grace_s: Number(document.getElementById("cfg_ndi_startup_grace_s").value || 10),
      ndi_stall_timeout_s: Number(document.getElementById("cfg_ndi_stall_timeout_s").value || 5),
    };
    const r = await jpost("/api/config/ui", payload);
    toastId("toastConfig", r.ok ? "Config saved." : "Config save failed.", !r.ok);
    await refreshConfig();
  } catch(e){
    toastId("toastConfig", "Config save failed: " + e, true);
  }
});

document.getElementById("rebootPi").addEventListener("click", async () => {
  toastId("toastPower", "Rebooting…");
  try{
    const r = await jpost("/api/system/reboot", {});
    toastId("toastPower", r.message || "Reboot requested.");
  } catch(e){
    toastId("toastPower", "Reboot failed: " + e, true);
  }
});

(async () => {
  await refreshAll();
  await refreshUpdateStatus();
  setInterval(refreshNetwork, 10000);
})();
</script>
</body>
</html>
